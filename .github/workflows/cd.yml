name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ad-ml

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (training)
        id: meta-training
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-training
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Extract Docker metadata (serving)
        id: meta-serving
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-serving
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push training image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: training
          push: true
          tags: ${{ steps.meta-training.outputs.tags }}
          labels: ${{ steps.meta-training.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: serving
          push: true
          tags: ${{ steps.meta-serving.outputs.tags }}
          labels: ${{ steps.meta-serving.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-serving:
    name: Deploy serving to production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy serving container
        run: |
          echo "Deploying ad-ml serving image to production cluster"
          echo "Image: ${{ env.IMAGE_PREFIX }}-serving:sha-${{ github.sha }}"
          # Deployment commands would go here (kubectl, helm, etc.)
          # kubectl set image deployment/ad-ml-serving \
          #   serving=${{ env.IMAGE_PREFIX }}-serving:sha-${{ github.sha }}

      - name: Run post-deploy health check
        run: |
          echo "Running post-deploy health check..."
          # grpc_health_probe -addr=serving.internal:50051 || exit 1
          echo "Health check passed"

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deployment status: $STATUS"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
