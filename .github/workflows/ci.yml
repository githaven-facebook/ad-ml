name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 black isort

      - name: Check formatting with black
        run: black --check src/ scripts/ tests/

      - name: Check import ordering with isort
        run: isort --check-only src/ scripts/ tests/

      - name: Lint with flake8
        run: flake8 src/ scripts/ tests/

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install package with dev extras
        run: |
          pip install --upgrade pip
          pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/ad_ml --ignore-missing-imports

  unit-tests:
    name: Unit tests (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --timeout=120

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage
        if: always()

  integration-tests:
    name: Integration tests (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --timeout=300

  model-smoke-test:
    name: Model smoke test
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Smoke test - model instantiation and forward pass
        run: |
          python - <<'EOF'
          import torch
          from ad_ml.models.user_persona.model import UserPersonaNet
          from ad_ml.models.autobid.model import AutobidNet

          # Persona forward pass
          persona = UserPersonaNet(seq_feature_dim=16, user_feature_dim=8, num_segments=4)
          seq = torch.randn(2, 5, 16)
          feat = torch.randn(2, 8)
          lengths = torch.tensor([5, 3])
          out = persona(seq, feat, lengths)
          assert out.user_embedding.shape == (2, 128), f"Bad shape: {out.user_embedding.shape}"
          assert out.cluster_probs.shape == (2, 4)

          # Autobid forward pass
          autobid = AutobidNet(input_dim=32, min_bid=0.5, max_bid=3.0)
          cf = torch.randn(2, 16)
          ctx = torch.randn(2, 16)
          out = autobid(cf, ctx)
          assert (out.bid_multiplier >= 0.5).all()
          assert (out.bid_multiplier <= 3.0).all()
          print("Smoke test passed")
          EOF
