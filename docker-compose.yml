version: "3.9"

services:
  # -----------------------------------------------------------------------
  # GPU training service (user persona)
  # -----------------------------------------------------------------------
  train-persona:
    build:
      context: .
      target: training
    image: ad-ml:training
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command:
      - scripts/train_user_persona.py
      - --config
      - configs/user_persona_config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - mlflow
    networks:
      - ad-ml-net

  # -----------------------------------------------------------------------
  # GPU training service (autobid)
  # -----------------------------------------------------------------------
  train-autobid:
    build:
      context: .
      target: training
    image: ad-ml:training
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command:
      - scripts/train_autobid.py
      - --config
      - configs/autobid_config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - mlflow
    networks:
      - ad-ml-net

  # -----------------------------------------------------------------------
  # CPU inference server
  # -----------------------------------------------------------------------
  serving:
    build:
      context: .
      target: serving
    image: ad-ml:serving
    ports:
      - "50051:50051"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
    environment:
      - SERVING_PERSONA_MODEL_PATH=/app/checkpoints/user_persona/best.pt
      - SERVING_AUTOBID_MODEL_PATH=/app/checkpoints/autobid/best.pt
      - SERVING_REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - ad-ml-net
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # MLflow tracking server
  # -----------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:///mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
      - --host
      - "0.0.0.0"
      - --port
      - "5000"
    networks:
      - ad-ml-net
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Redis for prediction caching
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - ad-ml-net
    restart: unless-stopped

volumes:
  mlflow-data:

networks:
  ad-ml-net:
    driver: bridge
