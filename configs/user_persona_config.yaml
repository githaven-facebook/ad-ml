embedding_dim: 128
hidden_dims: [256, 128, 64]
num_segments: 32
gru_hidden_size: 256
gru_num_layers: 2
attention_heads: 8
dropout: 0.1
max_sequence_length: 512

learning_rate: 0.001
batch_size: 512
epochs: 50
warmup_steps: 1000
grad_clip_norm: 1.0
early_stopping_patience: 5

reconstruction_weight: 1.0
clustering_weight: 0.1
contrastive_weight: 0.05
contrastive_temperature: 0.07
