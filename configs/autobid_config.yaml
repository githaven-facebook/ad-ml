input_dim: 128
hidden_dims: [512, 256, 128]
cross_layers: 3
dropout: 0.1
bid_range: [0.5, 3.0]

learning_rate: 0.0005
batch_size: 1024
epochs: 100
warmup_steps: 2000
grad_clip_norm: 1.0
early_stopping_patience: 10

replay_buffer_size: 100000
replay_batch_size: 256

constraint_penalty_weight: 0.5
entropy_weight: 0.01
